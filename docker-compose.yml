# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Incident Response Agent
# Version-lock: Compose Spec (no legacy "version:" key needed)
#
# PURPOSE:
#   Runs the Qdrant vector database for local development.
#   This file deliberately contains ONLY infrastructure services — the
#   application itself is run via `npm run dev` outside Docker during
#   development, which makes hot-reload and debugging trivial.
#
# DECISIONS:
#   • Qdrant only — keeps compose lean; app is started via npm scripts.
#   • Named volume (qdrant_data) — survives container recreation.
#   • restart: unless-stopped — auto-restarts on crash without starting
#     on system boot (unlike `always`).
#   • Healthcheck via /healthz endpoint — Docker waits for readiness before
#     marking the container healthy (important for CI pipeline ordering).
#   • gRPC port 6334 exposed — for future high-throughput tooling.
#
# USAGE:
#   docker compose up -d       # start Qdrant in background
#   docker compose down        # stop without removing volume
#   docker compose down -v     # stop AND remove volume (data loss!)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Qdrant Vector Database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.2

    container_name: incident-agent-qdrant

    restart: unless-stopped

    ports:
      # REST API — primary interface used by @qdrant/js-client-rest
      - "6333:6333"
      # gRPC API — available for high-throughput future use
      - "6334:6334"

    volumes:
      # Named volume keeps vector data between container restarts
      - qdrant_data:/qdrant/storage

    environment:
      # Qdrant logs at info level in dev; set to "warn" or "error" in prod
      QDRANT__LOG_LEVEL: "INFO"

      # Disable anonymous telemetry in Qdrant
      QDRANT__TELEMETRY_DISABLED: "true"

    healthcheck:
      # Qdrant exposes /healthz on its REST port when ready to accept traffic
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      # How long to wait before running the first check
      start_period: 10s
      # How often to re-run the check
      interval: 15s
      # Fail if response takes longer than this
      timeout: 5s
      # Mark unhealthy after this many consecutive failures
      retries: 3

    # Resource limits — prevents Qdrant from starving the host during dev
    deploy:
      resources:
        limits:
          memory: 512M

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  qdrant_data:
    driver: local
    name: incident-agent-qdrant-data
